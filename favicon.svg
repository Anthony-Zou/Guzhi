<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- 故知 · 两个相切的圆 ·  guzhi.app -->
  <!-- 深底 + 暖橙圆,小尺寸仍可辨 -->
  <rect width="64" height="64" rx="12" fill="#14110f"/>
  <!-- 左圆:实心暖橙 -->
  <circle cx="23" cy="32" r="13" fill="#e0a05a"/>
  <!-- 右圆:描边,与左圆相切 -->
  <circle cx="48" cy="32" r="12.5" fill="none" stroke="#e0a05a" stroke-width="2.5"/>
</svg>
